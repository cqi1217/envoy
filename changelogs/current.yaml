date: Pending

behavior_changes:
# *Changes that are expected to cause an incompatibility if applicable; deployment changes are likely required*

minor_behavior_changes:
# *Changes that may cause incompatibilities for some users, but should not for most*
- area: router
  change: |
    The upstream transport failure reason (e.g. TLS certificate validation errors) is no longer included
    in the HTTP response body sent to downstream clients. It remains available in access logs via
    ``%UPSTREAM_TRANSPORT_FAILURE_REASON%``. This behavioral change can be temporarily reverted by setting
    runtime guard ``envoy.reloadable_features.hide_transport_failure_reason_in_response_body`` to ``false``.
    This is being changed because in many cases the upstream failure details are inappropriate to send to
    the downstream client as it discloses too many internal details.
- area: golang
  change: |
    Reduced the per-cgo-call mutex acquisition on the Golang HTTP filter by making the
    ``has_destroyed_`` flag a ``std::atomic<bool>``. CAPI methods whose only Envoy-side work is
    Filter-owned or runs on the worker thread (``setHeader``, ``removeHeader``, ``setTrailer``,
    ``removeTrailer``, ``addData``, ``injectData``, ``continueStatus``, ``sendLocalReply``,
    ``setBufferHelper``, ``copyBuffer``, ``drainBuffer``, ``setUpstreamOverrideHost``,
    ``clearRouteCache``, ``setDynamicMetadata``, ``setStringFilterState``) no longer take the
    mutex, eliminating an uncontended atomic compare-and-swap pair on every such call. The
    mutex is retained on the CAPI methods that inline-dereference Envoy-stream-owned objects
    from off-thread (``getHeader``, ``copyHeaders``, ``copyTrailers``, ``getIntegerValue``,
    ``setDrainConnectionUponCompletion``) where it serialises against ``onDestroy`` to prevent
    the worker thread from freeing the underlying header map or ``StreamInfo`` mid-access, and
    on the five methods that write to the per-request ``strValue`` scratch buffer
    (``getStringValue``, ``getDynamicMetadata``, ``getStringFilterState``, ``getStringProperty``,
    ``getSecret``).
- area: stats
  change: |
    Optimized prometheus stats endpoint. Users should see a roughly 30-40% latency improvement in calls to the endpoint
    for cases where the scrape results in lots of cluster stats.
    There should be no visible changes to users, or incompatibilities.
- area: tls
  change: |
    ``SslSocket`` now reports ``ECONNRESET`` as ``ConnectionReset`` by reading the system error
    code from BoringSSL's error queue, matching ``RawBufferSocket`` behavior. When a connection
    is closed with ``ConnectionCloseType::AbortReset``, ``SslSocket`` also skips the TLS
    ``close_notify`` shutdown so the peer reliably observes a TCP RST instead of racing a
    graceful close against the reset.
    This behavioral change can be temporarily reverted by setting runtime guard
    ``envoy.reloadable_features.ssl_socket_report_connection_reset`` to ``false``.

bug_fixes:
# *Changes expected to improve the state of the world and are unlikely to have negative effects*
- area: wasm
  change: |
    Fixed a bug where Envoy did not recreate the Wasm VM when only
    :ref:`environment_variables <envoy_v3_api_field_extensions.wasm.v3.VmConfig.environment_variables>`
    changed in ``vm_config``. The VM was previously reused from the cache because environment variables
    were not included in the vm_key computation.
- area: load_report
  change: |
    Fixed a bug in load stats reporting where reports were dropped if only custom metrics or completed
    requests were present in a reporting interval. This behavioral change can be reverted by setting
    the runtime guard ``envoy.reloadable_features.report_load_for_non_zero_stats`` to ``false``.
- area: spiffe_validator
  change: |
    Fixed a bug where if an invalid custom SAN matcher was configured it would later lead to a crash
    when validating a certificate.
- area: rbac
  change: |
    Fixed a bug in the :ref:`mTLS Authenticated <envoy_v3_api_msg_extensions.rbac.principals.mtls_authenticated.v3.Config>`
    principal extension where if an invalid SAN matcher was configured, it would incorrectly match any
    certificate in the allowed trust chain. Known bad configurations are an invalid ``OID`` when using
    an ``OTHER_NAME``, or specifying a ``StringMatcher`` with an invalid configuration.
- area: build
  change: |
    Fixed ``Illegal ambiguous match`` error when building contrib targets with ``--config=aws-lc-fips``
    on aarch64 by restricting the ``using_aws_lc`` branch of ``SELECTED_CONTRIB_EXTENSIONS`` to
    ``linux_x86_64``. Mirrors the approach taken by #32382 for ``boringssl_fips``.
- area: dynamic_modules
  change: |
    Fixed a crashing bug in the HTTP filter when a stream was already above the downstream write-buffer
    high watermark at filter-chain construction time. Downstream watermark callback registration is
    now deferred until the in-module filter has been constructed.
- area: dynamic_modules
  change: |
    Fixed a bug where the HTTP filter per-route configuration and the upstream HTTP TCP bridge
    configuration did not handle the ``google.protobuf.Struct`` configuration message as the API
    definition requires. Both factories now serialize the ``Struct`` to a JSON string and pass the
    string to the dynamic module side as the configuration, matching the behavior already in place
    for every other dynamic module extension factory.
- area: oauth2
  change: |
    Fixed a crash in the OAuth2 filter where AES-CBC decryption of token cookies could spuriously
    succeed (~1/256) when the configured HMAC secret did not match the secret used to encrypt the
    cookie (for example after secret rotation, or when receiving legacy unencrypted tokens). The
    resulting binary "plaintext" was written back into the ``Cookie:`` request header and tripped a
    ``HeaderString`` validation assert. Such plaintexts are now rejected and the original cookie value
    is preserved, matching the behavior already documented for the explicit decryption-failure case.

removed_config_or_runtime:
# *Normally occurs at the end of the* :ref:`deprecation period <deprecated>`

new_features:
- area: aws_eventstream_parser
  change: |
    Added the :ref:`aws_eventstream_parser <config_http_filters_aws_eventstream_parser>` filter.
    This filter extracts values from AWS EventStream HTTP response bodies (used by AWS Bedrock streaming APIs)
    and writes them to dynamic metadata for observability, logging, and cost tracking use cases.
- area: lua
  change: |
    Added stats API support to the :ref:`Lua filter <config_http_filters_lua>`, allowing Lua
    scripts to create and increment counters, gauges, and histograms via
    ``handle:streamInfo():stats()``.
- area: dynamic_modules
  change: |
    Added ``envoy_dynamic_module_callback_is_validation_mode`` ABI callback that allows dynamic
    modules to check if the server is running in config validation mode.
- area: ratelimit
  change: |
    Added ``is_negative_hits`` boolean to the ``hits_addend``
    configuration in the rate limit API. This allows rate limit
    requests to add to the rate limit budget (refill previously
    consumed tokens) via
    :ref:`HitsAddend.is_negative_hits
    <envoy_v3_api_field_config.route.v3.RateLimit.HitsAddend.is_negative_hits>`,
    or per descriptor in
    :ref:`RateLimitDescriptor.is_negative_hits
    <envoy_v3_api_field_extensions.common.ratelimit.v3.RateLimitDescriptor.is_negative_hits>`.
- area: redis
  change: |
    Added zone-aware routing support for Redis Cluster proxy. New read policies
    ``LOCAL_ZONE_AFFINITY`` and ``LOCAL_ZONE_AFFINITY_REPLICAS_AND_PRIMARY`` route read requests
    to replicas in the same availability zone. Zone discovery is enabled via
    :ref:`enable_zone_discovery
    <envoy_v3_api_field_extensions.clusters.redis.v3.RedisClusterConfig.enable_zone_discovery>`.
    Note: This feature currently works with Valkey only.
- area: overload_manager
  change: |
    Added :ref:`ShrinkHeapConfig <envoy_v3_api_msg_config.overload.v3.ShrinkHeapConfig>` typed
    configuration for the ``envoy.overload_actions.shrink_heap`` overload action. This allows
    operators to configure the timer interval (``timer_interval``, minimum 1s, default 10s) and
    the memory release threshold (``max_unfreed_memory_bytes``, default 100MB) passed to
    ``tcmalloc::MallocExtension::ReleaseMemoryToSystem()``.
- area: dns_resolver
  change: |
    Added :ref:`HickoryDnsResolverConfig
    <envoy_v3_api_msg_extensions.network.dns_resolver.hickory.v3.HickoryDnsResolverConfig>`, a new DNS
    resolver using the `Hickory DNS <https://github.com/hickory-dns/hickory-dns>`_ library.
- area: dynamic_modules
  change: |
    Added :ref:`tracer <envoy_v3_api_msg_extensions.tracers.dynamic_modules.v3.DynamicModuleTracer>`
    support for dynamic modules, enabling custom distributed tracing backends to be implemented
    in dynamic modules.
- area: dynamic_modules
  change: |
    Added upstream HTTP TCP bridge extension for dynamic modules. This enables modules to transform
    HTTP requests into raw TCP data for upstream connections and convert TCP responses back into HTTP
    responses via explicit send callbacks. See :ref:`envoy.upstreams.http.dynamic_modules
    <envoy_v3_api_msg_extensions.upstreams.http.dynamic_modules.v3.Config>`.
- area: filters
  change: |
    Added filters to update the filter state in :ref:`a listener filter <config_listener_filters_set_filter_state>`.
- area: tls
  change: |
    Added a per-connection filter state object to select a workload trust domain in the SPIFFE validator in
    the multi-tenant deployments.
- area: tls
  change: |
    Extended TLS certificate compression (RFC 8879): added brotli to QUIC (which already supported zlib),
    and added brotli and zlib to TCP TLS. Controlled by runtime flag
    ``envoy.reloadable_features.tls_certificate_compression_brotli`` (defaults to ``true``).
    When disabled, QUIC retains zlib-only compression, while TCP TLS has no compression.
- area: tls
  change: |
    Exposed the SHA-256 fingerprint and serial number of the verified issuer (CA) certificate from
    the validated downstream mTLS peer certificate chain. Accessible via the
    ``%DOWNSTREAM_PEER_ISSUER_FINGERPRINT_256%`` and ``%DOWNSTREAM_PEER_ISSUER_SERIAL%``
    :ref:`access log formatters <config_access_log_format>`, and via the
    ``sha256PeerCertificateIssuerDigest()`` and ``serialNumberPeerCertificateIssuer()`` methods on
    :ref:`downstreamSslConnection() <config_http_filters_lua_ssl_socket_info>` in the Lua filter.
- area: dynamic_modules
  change: |
    Added custom metrics (counters, gauges, histograms) support to load balancer dynamic modules.
    Modules can now define metrics during configuration and record them during host selection.
- area: dynamic_modules
  change: |
    Rust SDK now provides an opt-in ``CatchUnwind`` wrapper for filter callbacks. When a
    wrapped callback panics, Envoy logs the panic and returns a fail-closed error (e.g.
    HTTP 500, stream reset, connection close) instead of aborting the process.
- area: http_11_proxy
  change: |
    Added ability to configure a default proxy address that is used when the proxy address is not
    configured via metadata.
- area: compressor
  change: |
    Added :ref:`weaken_etag_on_compress
    <envoy_v3_api_field_extensions.filters.http.compressor.v3.Compressor.ResponseDirectionConfig.weaken_etag_on_compress>`
    to the :ref:`compressor filter <config_http_filters_compressor>`. When enabled in
    ``response_direction_config``, strong ``ETag`` response headers are weakened (``W/`` prefix)
    instead of removed when compression is applied, allowing caches and conditional requests to
    work while indicating the body was modified by compression. When both ``weaken_etag_on_compress``
    and ``disable_on_etag_header`` are true, the new field takes precedence.
- area: golang
  change: |
    Added ``DownstreamSslConnection()`` method to the Golang HTTP filter's ``StreamInfo`` interface,
    providing access to SSL/TLS connection information for the downstream connection. This includes
    peer certificate details (subject, issuer, serial number, SANs, validity), TLS version, cipher
    suite, and PEM-encoded certificates. This achieves feature parity with the Lua filter's
    ``downstreamSslConnection()`` functionality.
- area: outlier_detection
  change: |
    Added :ref:`detect_degraded_hosts <envoy_v3_api_field_config.cluster.v3.OutlierDetection.detect_degraded_hosts>`
    to enable passive degraded host detection. When enabled, outlier detection marks hosts as degraded when they return
    the ``x-envoy-degraded`` header. Degraded hosts are deprioritized in load balancing but remain in rotation (not
    ejected). The degraded state is cleared using the same backoff algorithm as ejection. Defaults to ``false``.
- area: http2
  change: |
    Added :ref:`max_header_field_size_kb
    <envoy_v3_api_field_config.core.v3.Http2ProtocolOptions.max_header_field_size_kb>` to configure the
    maximum wire-encoded size in KiB of an individual HPACK-encoded header field that the HTTP/2
    codec will accept. This allows increasing the default nghttp2 per-header limit of 64 KiB on the
    wire when larger single headers need to be supported.
- area: dynamic_modules
  change: |
    Added dynamic module input matcher extension that allows implementing custom matching logic
    in external languages (Rust, Go, C) via dynamic modules.
- area: dynamic_modules
  change: |
    Added listener lifecycle event callbacks to the bootstrap dynamic module extension. Modules can
    opt in via ``enable_listener_lifecycle`` to receive ``on_listener_add_or_update`` and
    ``on_listener_removal`` notifications when listeners change in the ``ListenerManager``.
- area: memory
  change: |
    Added ``soft_memory_limit_bytes``, ``max_per_cpu_cache_size_bytes``, and ``max_unfreed_memory_bytes``
    fields to :ref:`MemoryAllocatorManager <envoy_v3_api_msg_config.bootstrap.v3.MemoryAllocatorManager>`
    for fine-grained control of tcmalloc memory management.
- area: dynamic_modules
  change: |
    Added :ref:`TLS certificate validator
    <envoy_v3_api_msg_extensions.transport_sockets.tls.cert_validator.dynamic_modules.v3.DynamicModuleCertValidatorConfig>`
    support for dynamic modules, enabling custom TLS certificate validation to be implemented in dynamic modules.
- area: dynamic_modules
  change: |
    Added filter state read/write support for dynamic module cert validators, allowing modules to set and
    get string values in the connection's filter state during certificate chain verification.
- area: dynamic_modules
  change: |
    Added ``write_to_socket`` and ``close_socket`` ABI callbacks for the dynamic module listener
    filter, enabling protocol negotiation use cases such as Postgres SSL and MySQL handshake at the listener
    filter level.
- area: dynamic_modules
  change: |
    Added HTTP callout support for dynamic module listener filters, enabling listener filters to initiate
    asynchronous HTTP requests to upstream clusters and receive responses via the ``send_http_callout`` ABI
    callback and ``on_listener_filter_http_callout_done`` event hook.
- area: ext_authz
  change: |
    Added :ref:`path_override <envoy_v3_api_field_extensions.filters.http.ext_authz.v3.HttpService.path_override>`
    to the HTTP ext_authz filter. When set, the request path sent to the authorization service is replaced
    entirely by this value. Only one of ``path_prefix`` or ``path_override`` may be set; validation fails
    at config load if both are specified.
- area: stats
  change: |
    Added support to limit the number of metrics stored in each scope within the stats library.
- area: stats
  change: |
    The admin prometheus stats endpoint now supports the protobuf exposition format, and will automatically
    use it if the request contains the correct Accept header, or if query parameter ``prom_protobuf=1`` is
    set. In a prometheus scrape configuration, add ``PrometheusProto`` to ``scrape_protocols`` to use
    the protobuf format. Additionally, when using the protobuf exposition format, the admin prometheus stats
    endpoint now supports `native histograms <https://prometheus.io/docs/specs/native_histograms>`_
    when using the prometheus protobuf exposition format, using query
    ``/stats/prometheus?histogram_buckets=prometheusnative``.
- area: stats
  change: |
    Added support for cluster-level stats matcher, allowing more granular control over which stats
    are enabled and reported at the cluster level. This the stats matcher could be configured via
    the xDS API dynamically on a per-cluster basis.
    See :ref:`envoy.stats_matcher <well_known_metadata_envoy_stats_matcher>` for more details.
- area: stats
  change: |
    Added support for listener-level stats matcher via ``typed_filter_metadata`` key
    ``envoy.stats_matcher`` in the listener's
    :ref:`metadata <envoy_v3_api_field_config.listener.v3.Listener.metadata>`. When present,
    the provided :ref:`StatsMatcher <envoy_v3_api_msg_config.metrics.v3.StatsMatcher>` replaces
    the global stats matcher for that listener's stats scope, allowing fine-grained control over
    which listener stats are created.
    If the value of ``envoy.stats_matcher`` is set but does not contain a valid ``StatsMatcher``
    message, this will be treated as an invalid configuration and the listener will fail to start.
    This strict validation can be disabled temporarily by setting the runtime guard
    ``envoy.reloadable_features.strict_stats_matcher_unpacked`` to ``false``.
- area: tls
  change: |
    Added support for fetching certificates on-demand via SDS in the upstream TLS transport socket
    using the extension :ref:`on-demand certificate selector
    <extension_envoy.tls.certificate_selectors.on_demand_secret>`.
- area: access_log
  change: |
    Added stats customization support for the :ref:`access logger <envoy_v3_api_msg_extensions.access_loggers.stats.v3.Config>`.
- area: dynamic modules
  change: |
    Introduced the extended ABI forward compatibility mechanism for dynamic modules
    where modules built with an SDK version can be loaded by Envoy
    binaries of the next Envoy version. For example, a module built with the v1.38 SDK
    can now be loaded by an Envoy binary of v1.39.
- area: dynamic modules
  change: |
    Added drain and shutdown lifecycle hooks for bootstrap dynamic modules.
- area: dynamic modules
  change: |
    Added support for dynamic modules authors to register any combination of HTTP, network, listener,
    UDP listener, and bootstrap filters in the Rust SDK.
- area: dynamic modules
  change: |
    Added connection state and flow control ABI callbacks for the dynamic module network filter,
    including ``read_disable``, ``read_enabled``, ``get_connection_state``, ``enable_half_close``,
    ``is_half_close_enabled``, ``get_buffer_limit``, ``set_buffer_limits``, and
    ``above_high_watermark``.
- area: dynamic modules
  change: |
    Added socket property getter and SSL/TLS information ABI callbacks for the dynamic module listener
    filter, including ``get_requested_server_name``, ``get_detected_transport_protocol``,
    ``get_requested_application_protocols``, ``get_ja3_hash``, ``get_ja4_hash``, ``is_ssl``,
    ``get_ssl_uri_sans``, ``get_ssl_dns_sans``, and ``get_ssl_subject``.
- area: mcp_router
  change: |
    Added support for MCP resource methods ``resources/list``, ``resources/read``,
    ``resources/subscribe``, and ``resources/unsubscribe``.
- area: mcp_router
- area: router
  change: |
    Added support for ``refreshRouteCluster`` on weighted cluster routes. When a filter calls
    ``refreshRouteCluster()``, the weighted cluster entry will select a different cluster from the
    configured pool, avoiding previously-tried clusters within the same request. Once all clusters
    have been tried, the selection pool resets so that any cluster may be chosen again. This enables
    filters to implement per-attempt cluster failover across weighted clusters without replacing the
    entire route.
- area: tcp_proxy
  change: |
    Added :ref:`check_drain_close
    <envoy_v3_api_field_extensions.filters.network.tcp_proxy.v3.TcpProxy.check_drain_close>` to the TCP proxy
    filter to close downstream connections with ``FlushWrite`` when the drain manager requests drain close during
    downstream read or write handling.
- area: stat_sinks
  change: |
    Added :ref:`max_data_points_per_request
    <envoy_v3_api_field_extensions.stat_sinks.open_telemetry.v3.SinkConfig.max_data_points_per_request>`
    configuration to the OpenTelemetry stat sink to chunk metric export requests.
- area: set_metadata_filter
  change: |
    Added :ref:`per-route configuration support <envoy_v3_api_msg_extensions.filters.http.set_metadata.v3.Config>`
    to the ``set_metadata`` HTTP filter.
- area: logging
  change: |
    Added ``%N`` as a custom spdlog pattern flag that emits the Envoy version string. It can be
    used in the ``--log-format`` CLI flag or the bootstrap ``application_log_config.log_format``
    to include the running version in every log line, e.g. ``--log-format "[%N][%l] %v"``.
- area: dynamic_modules
  change: |
    Added ``envoy_dynamic_module_callback_is_validation_mode`` ABI callback that allows dynamic
    modules to check if the server is running in config validation mode.
- area: access_log
  change: |
    Supported the singleton stats scope in the :ref:`stats access logger <envoy_v3_api_msg_extensions.access_loggers.stats.v3.Config>`.
- area: stat_sinks
  change: |
    Added a new :ref:`WASM stats filter <config_stat_sinks_wasm_filter>` contrib extension
    (``envoy.stat_sinks.wasm_filter``) that acts as programmable middleware between
    the metrics snapshot and any inner stats sink. A user-supplied WASM plugin can:
    filter metrics by index, inject global tags from node metadata
    (``stats_filter_set_global_tags``), rename metrics (``stats_filter_set_name_overrides``),
    inject synthetic counters/gauges (``stats_filter_inject_metrics``), and filter
    histograms (``stats_filter_get_histograms``). This enables moving centralized
    metric processing logic (tag enrichment, name rewriting, custom metric injection)
    into the proxy itself. Configured via
    :ref:`WasmFilterStatsSinkConfig <envoy_v3_api_msg_extensions.stat_sinks.wasm_filter.v3.WasmFilterStatsSinkConfig>`.
- area: mysql_proxy
  change: |
    Added SSL termination support to the MySQL proxy filter with RSA-mediated ``caching_sha2_password``
    authentication. The filter can now terminate downstream TLS connections using the
    :ref:`starttls transport socket <envoy_v3_api_msg_extensions.transport_sockets.starttls.v3.StartTlsConfig>`
    and transparently mediate MySQL 8.0+ ``caching_sha2_password`` full authentication by performing
    RSA public key exchange on behalf of the client. Added a new
    :ref:`downstream_ssl <envoy_v3_api_field_extensions.filters.network.mysql_proxy.v3.MySQLProxy.downstream_ssl>`
    config option with ``DISABLE``, ``REQUIRE``, and ``ALLOW`` modes.
- area: quic
  change: |
    Added support for TLS session ticket resumption in QUIC using configured session ticket keys from
    :ref:`session_ticket_keys <envoy_v3_api_field_extensions.transport_sockets.tls.v3.DownstreamTlsContext.session_ticket_keys>`.
    This enables faster reconnection across server instances by allowing clients to resume TLS sessions
    without full handshakes. The feature is disabled by default and can be enabled by setting runtime guard
    ``envoy.reloadable_features.quic_session_ticket_support`` to ``true``.
- area: composite
  change: |
    Added support for the
    :ref:`inline matcher <envoy_v3_api_field_extensions.filters.http.composite.v3.Composite.matcher>`
    in the composite HTTP filter. Now users could specify the matcher inline in the filter configuration
    instead of using the :ref:`ExtensionWithMatcher
    <envoy_v3_api_msg_extensions.common.matching.v3.ExtensionWithMatcher>` filter.
- area: resource_monitors
  change: |
    Overload manager fixed heap resource monitor now supports :ref:`max_heap_size_bytes_runtime
    <envoy_v3_api_field_extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig.max_heap_size_bytes_runtime>`
    for runtime-overridable max heap size (e.g. RTDS or ``/runtime_modify``).
- area: jwt_authn
  change: |
    Added :ref:`verification_status_header
    <envoy_v3_api_field_extensions.filters.http.jwt_authn.v3.ExtractOnlyWithoutValidation.verification_status_header>`
    to the ``ExtractOnlyWithoutValidation`` requirement. When a JWT is present in the request but fails
    signature verification, the named request header (default ``x-jwt-signature-verified``) is set to
    ``false`` so downstream filters (RBAC, ext_authz) can distinguish forwarded-but-unverified claims
    from validated ones. The header is not set on a successfully verified JWT or when no JWT is present.
    This behavior can be reverted by setting the runtime guard
    ``envoy.reloadable_features.jwt_authn_add_verification_status_header`` to ``false``.
- area: access_log
  change: |
    Added ``%UPSTREAM_SERVER_NAME%`` access log formatter returning the SNI from the established upstream
    TLS connection.
- area: attributes
  change: |
    Added ``upstream.server_name`` CEL attribute returning the SNI from the established upstream
    TLS connection.

- area: tls
  change: |
    Added substitution commands ``%DOWNSTREAM_TLS_GROUP%`` and ``%UPSTREAM_TLS_GROUP%``. The TLS group may be used
    to discern if a TLS connection used a post quantum safe key exchange (e.g. X25519MLKEM768).

deprecated:
